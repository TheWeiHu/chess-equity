<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>chess-equity — streaming overlay</title>
  <link rel="stylesheet" href="overlay.css" />
</head>
<!--
  OBS browser source: a transparent, clock-aware EQUITY bar.

  Drop this URL into OBS → Sources → Browser. The page background is
  transparent, so only the bar/labels composite over your stream.

  Config via query params (all optional):
    ?src=URL        event source. SSE endpoint, ws[s]:// WebSocket, or a
                    .json replay file. Default: ./mock-game.json (replay).
    ?layout=horizontal|vertical   bar orientation (default horizontal).
    ?theme=dark|light             label theme (default dark).
    ?cp=1|0         show the classic centipawn "ghost" tick for contrast.
    ?cpbar=1        render the centipawn eval as a full second bar (not just a tick).
    ?caster=1       caster mode: flare on big practical swings the engine bar misses.
    ?legend=1       show a compact key (bar = White win%, grade colors) for new viewers.
    ?speed=N        replay speed multiplier for .json feeds (default 1).
    ?stale=N        seconds of feed silence before showing the STALE/reconnecting
                    state (live SSE/WS feeds only; default 10). 0 disables it.

  Event schema is documented in README.md (SCHEMA section) — this is the
  contract that the live ingestion task (0018) must emit.
-->
<body class="theme-dark">
  <div id="overlay" class="overlay layout-horizontal" aria-live="polite">
    <!-- Board selector (task 0185): hidden for a single-game feed; revealed and
         populated when the feed announces a multi-game round so a caster can flip
         which board the bar follows live. -->
    <select class="board-select" data-board-select aria-label="board" hidden></select>

    <div class="player player-white">
      <span class="name" data-white-name>White</span>
      <span class="rating" data-white-rating></span>
      <span class="clock" data-white-clock></span>
    </div>

    <div class="bar-stack">
      <div class="bar" role="img" aria-label="equity bar">
        <div class="bar-fill-white" data-bar-white></div>
        <div class="bar-fill-black" data-bar-black></div>
        <div class="cp-ghost" data-cp-ghost title="classic centipawn eval"></div>
        <div class="equity-readout">
          <span class="pct pct-white" data-white-pct>50%</span>
          <span class="pct pct-black" data-black-pct>50%</span>
        </div>
        <div class="grade-pill" data-grade hidden></div>
        <div class="drama-flare" data-drama hidden></div>
        <div class="human-edge" data-edge title="practical equity disagrees with the engine bar" hidden></div>
        <!-- Stale-feed marker (task 0178): shown when the live feed drops; the bar
             dims behind it so a frozen bar can't be mistaken for a live one. -->
        <div class="stale-marker" data-stale title="live feed dropped — attempting to reconnect" hidden>⚠ reconnecting…</div>
      </div>

      <!-- Classic centipawn bar (?cpbar=1) — the engine's view, for contrast. -->
      <div class="bar bar-cp" data-cp-bar hidden role="img" aria-label="centipawn bar">
        <div class="bar-fill-white" data-cp-bar-white></div>
        <div class="bar-fill-black"></div>
        <span class="bar-cp-label">engine</span>
      </div>
    </div>

    <div class="player player-black">
      <span class="name" data-black-name>Black</span>
      <span class="rating" data-black-rating></span>
      <span class="clock" data-black-clock></span>
    </div>

    <!-- Legend key (task 0201): an optional, compact one-line key so a first-time
         viewer can read the bar. Off by default; revealed by ?legend=1 (set via the
         config.html toggle). A single row that lives in the reserved badge room so it
         doesn't clip at 1080p. Maps the bar fill to White win-equity %, and the two
         grade-pill colors to their label groups (green = a move that gained equity:
         good/brilliant; red = one that lost it: inaccuracy/mistake/blunder). -->
    <div class="legend" data-legend aria-label="overlay key" hidden>
      <span class="legend-item"><i class="sw sw-bar"></i>bar = White win-equity %</span>
      <span class="legend-item"><i class="sw sw-good"></i>good · brilliant</span>
      <span class="legend-item"><i class="sw sw-bad"></i>inaccuracy · blunder</span>
    </div>
  </div>

  <script src="feed.js"></script>
  <script src="overlay.js"></script>
</body>
</html>
