<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>chess-equity — streaming overlay</title>
  <link rel="stylesheet" href="overlay.css" />
</head>
<!--
  OBS browser source: a transparent, clock-aware EQUITY bar.

  Drop this URL into OBS → Sources → Browser. The page background is
  transparent, so only the bar/labels composite over your stream.

  Config via query params (all optional):
    ?src=URL        event source. SSE endpoint, ws[s]:// WebSocket, or a
                    .json replay file. Default: ./mock-game.json (replay).
    ?layout=horizontal|vertical   bar orientation (default horizontal).
    ?theme=dark|light             label theme (default dark).
    ?pov=white|stm  equity point of view. white (default) = classic always-White bar.
                    stm = add a readout for the side to move (flips when Black moves);
                    the bar fill stays player-honest in both.
    ?cp=1|0         show the classic centipawn "ghost" tick for contrast.
    ?cpbar=1        render the centipawn eval as a full second bar (not just a tick).
    ?caster=1       caster mode: flare on big practical swings the engine bar misses.
    ?legend=1       show a compact key (bar = White win%, grade colors) for new viewers.
    ?speed=N        replay speed multiplier for .json feeds (default 1).
    ?stale=N        seconds of feed silence before showing the STALE/reconnecting
                    state (live SSE/WS feeds only; default 10). 0 disables it.

  Event schema is documented in README.md (SCHEMA section) — this is the
  contract that the live ingestion task (0018) must emit.
-->
<body class="theme-dark">
  <div id="overlay" class="overlay layout-horizontal" aria-live="polite">
    <!-- Board selector (task 0185): hidden for a single-game feed; revealed and
         populated when the feed announces a multi-game round so a caster can flip
         which board the bar follows live. -->
    <select class="board-select" data-board-select aria-label="board" hidden></select>

    <div class="player player-white">
      <span class="name" data-white-name>White</span>
      <span class="rating" data-white-rating></span>
      <span class="clock" data-white-clock></span>
      <!-- Flag-risk alert (task 0243): a 🚩 badge that lights when the MODEL's per-side
           flag_risk (chess_equity.clock.flag_risk) crosses its alert threshold — real
           time trouble, distinct from the raw-seconds low-clock nameplate tint (0105). -->
      <span class="flag-risk" data-white-flagrisk title="time trouble — high flag risk" hidden>🚩</span>
    </div>

    <div class="bar-stack">
      <!-- Model badge (task 0222): names the model driving the fill so a viewer can tell
           this is a rating-conditioned HUMAN win-probability bar, not a Stockfish eval.
           Set from the one-time `game` event; stays hidden when no model is announced. -->
      <div class="model-badge" data-model title="the human win-probability model driving this bar" hidden></div>
      <div class="bar" role="img" aria-label="equity bar">
        <div class="bar-fill-white" data-bar-white></div>
        <div class="bar-fill-black" data-bar-black></div>
        <div class="cp-ghost" data-cp-ghost title="classic centipawn eval"></div>
        <div class="equity-readout">
          <span class="pct pct-white" data-white-pct>50%</span>
          <span class="pct pct-black" data-black-pct>50%</span>
        </div>
        <!-- Side-to-move readout (?pov=stm, task 0206): reframes the equity to the
             player on the move (flips when Black is to move). Off by default — the
             classic bar is White-POV. The physical bar stays player-honest; only this
             readout follows the side to move. -->
        <div class="stm-readout" data-stm-pct title="equity for the side to move" hidden></div>
        <div class="grade-pill" data-grade hidden></div>
        <div class="drama-flare" data-drama hidden></div>
        <div class="human-edge" data-edge title="practical equity disagrees with the engine bar" hidden></div>
        <!-- Out-of-distribution high-rating marker (task 0255): both players are above
             Maia-2's coarse `>2000` rating bucket, so the bar can't tell 2200 from 2800.
             A subtle `?` with a tooltip; the bar also hatches (CSS `.bar.rating-ood`).
             Server-driven via the `rating_ood` boolean; hidden when in-distribution. -->
        <div class="rating-ood" data-rating-ood title="rating bucket coarse above 2000 — equity is a >2000 bucket read, not a 2200-vs-2800 distinction" hidden>?</div>
        <!-- Momentum arrow (task 0208): direction + size of the last equity swing so
             viewers see who just gained at a glance. Always-on but invisible until a real
             swing; fades out over the next few moves. Bottom-right, clear of the other
             badges (drama top-right, human-edge bottom-left). -->
        <div class="momentum" data-momentum title="last equity swing" aria-hidden="true" hidden></div>
        <!-- Drama toast (task 0241): a transient, labelled flash ('CLUTCH +12%',
             'ESCAPE', 'MISSED WIN', 'SCRAMBLE') fed by the server's per-move drama
             `kind` (chess_equity.drama.score_event). Appears on a drama-tagged move,
             then auto-hides as quiet moves decay it — the caster's "look at THIS" cue.
             Distinct from the caster-mode drama-flare (client-side swing heuristic). -->
        <div class="drama-toast" data-toast role="status" aria-live="polite" hidden></div>
        <!-- Stale-feed marker (task 0178): shown when the live feed drops; the bar
             dims behind it so a frozen bar can't be mistaken for a live one. -->
        <div class="stale-marker" data-stale title="live feed dropped — attempting to reconnect" hidden>⚠ reconnecting…</div>

        <!-- Focus-cut lower third (task 0264): when the server-side auto-director
             (`--board auto`, tasks 0256/0260) cuts to a different board it emits a
             `focus` event carrying a `reason` cue ("cut to Bd3: +0.9 swing vs +0.4").
             Render it as a brief lower-third banner so the streamer-facing payoff of the
             auto-director is visible on the OBS source, then fade it after a few seconds.
             Routing-only `focus` events (caster pins with no reason) don't banner. -->
        <div class="focus-banner" data-focus-banner role="status" aria-live="polite" hidden></div>

        <!-- Game-over card (task 0213): shown over the bar when the FOLLOWED board's
             game ends, so a finished game reads as finished instead of a frozen bar.
             Result token + winner headline + the equity the bar froze on. Non-followed
             boards never card (they just route/auto-advance). -->
        <div class="gameover-card" data-gameover role="status" hidden>
          <span class="gameover-result" data-gameover-result></span>
          <span class="gameover-headline" data-gameover-headline></span>
          <span class="gameover-equity" data-gameover-equity></span>
        </div>
      </div>

      <!-- Classic centipawn bar (?cpbar=1) — the engine's view, for contrast. -->
      <div class="bar bar-cp" data-cp-bar hidden role="img" aria-label="centipawn bar">
        <div class="bar-fill-white" data-cp-bar-white></div>
        <div class="bar-fill-black"></div>
        <span class="bar-cp-label">engine</span>
      </div>
    </div>

    <div class="player player-black">
      <span class="name" data-black-name>Black</span>
      <span class="rating" data-black-rating></span>
      <span class="clock" data-black-clock></span>
      <span class="flag-risk" data-black-flagrisk title="time trouble — high flag risk" hidden>🚩</span>
    </div>

    <!-- Legend key (task 0201): an optional, compact one-line key so a first-time
         viewer can read the bar. Off by default; revealed by ?legend=1 (set via the
         config.html toggle). A single row that lives in the reserved badge room so it
         doesn't clip at 1080p. Maps the bar fill to White win-equity %, and the two
         grade-pill colors to their label groups (green = a move that gained equity:
         good/brilliant; red = one that lost it: inaccuracy/mistake/blunder). -->
    <div class="legend" data-legend aria-label="overlay key" hidden>
      <span class="legend-item"><i class="sw sw-bar"></i>bar = White win-equity %</span>
      <span class="legend-item"><i class="sw sw-good"></i>good · brilliant</span>
      <span class="legend-item"><i class="sw sw-bad"></i>inaccuracy · blunder</span>
    </div>
  </div>

  <script src="feed.js"></script>
  <script src="overlay.js"></script>
</body>
</html>
