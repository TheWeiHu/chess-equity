<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>chess-equity — the rating-conditioned eval bar</title>
  <style>
    /* Unified demo shell. Two demos live behind tabs, each in its own iframe so the
       pages keep their own scripts/styles with no collisions:
         • Guided  — guided.html: precomputed famous games, static (works on Pages).
         • Live    — live.html:   move your own pieces, scored live by the backend
                                   (needs `uv run python web/server.py`). */
    :root { --bg:#12141a; --ink:#e8eaed; --muted:#9aa0a6; --accent:#5aa86f; --line:#262a31; --surface:#1a1d24; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--ink);
           font:16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif; }
    header { padding: 1.6rem clamp(1rem, 4vw, 2.5rem) 0.6rem; }
    header h1 { margin:0; font-size: clamp(1.7rem, 4vw, 2.4rem); font-weight: 800; letter-spacing:-.02em; }
    header h1 .accent { color: var(--accent); }
    header .tagline { margin:.35rem 0 0; max-width: 62ch; color: var(--muted); }
    header .tagline strong { color: var(--ink); }
    .tabs { display:flex; gap:.4rem; padding: .9rem clamp(1rem, 4vw, 2.5rem) 0; border-bottom: 1px solid var(--line); }
    .tab { appearance:none; border:1px solid var(--line); border-bottom:none; background:transparent; color:var(--muted);
           font:inherit; font-weight:700; padding:.6rem 1.1rem; border-radius:10px 10px 0 0; cursor:pointer; }
    .tab:hover { color: var(--ink); }
    .tab.active { background: var(--surface); color: var(--ink); border-color: var(--line); position:relative; top:1px; }
    .tab .hint { font-weight: 500; font-size:.78rem; color: var(--muted); margin-left:.4rem; }
    .stage { background: var(--surface); }
    iframe { display:block; width:100%; border:0; min-height: 760px; background: transparent; }
    .note { color: var(--muted); font-size:.85rem; padding:.6rem clamp(1rem,4vw,2.5rem); }
    .note code { background:#23262e; padding:.05rem .35rem; border-radius:5px; }
  </style>
</head>
<body>
  <header>
    <h1>chess&#8202;<span class="accent">equity</span></h1>
    <p class="tagline">A win bar that knows <em>who</em> is playing. Drag a rating slider —
      the <strong>equity</strong> bar moves; the classic <strong>centipawn</strong> bar can't.</p>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" id="tab-guided" data-src="guided.html" role="tab">📖 Guided games
      <span class="hint">precomputed · famous mates</span></button>
    <button class="tab" id="tab-live" data-src="live.html" role="tab">🔴 Live board
      <span class="hint" id="live-hint">move your own pieces</span></button>
  </nav>

  <div class="stage">
    <iframe id="demo" title="chess-equity demo" src="about:blank"></iframe>
  </div>
  <p class="note" id="live-note" hidden>The live board needs the backend —
    run <code>uv run python web/server.py</code> and reload.</p>

  <script>
    (function () {
      var iframe = document.getElementById("demo");
      var tabs = Array.prototype.slice.call(document.querySelectorAll(".tab"));
      // Carry a ?game=<file> deep-link straight into the guided demo.
      var raw = new URLSearchParams(location.search).get("game");
      var gameQ = (raw && /^[A-Za-z0-9._-]+\.json$/.test(raw) && raw.indexOf("..") === -1)
        ? "&game=" + encodeURIComponent(raw) : "";

      function show(tab) {
        tabs.forEach(function (t) { t.classList.toggle("active", t === tab); });
        var extra = tab.id === "tab-guided" ? gameQ : "";
        iframe.src = tab.dataset.src + "?embed=1" + extra;
      }
      tabs.forEach(function (t) { t.addEventListener("click", function () { show(t); }); });

      // Auto-size the iframe to its content (each embedded page posts its height).
      window.addEventListener("message", function (e) {
        if (e.data && typeof e.data.chessEquityHeight === "number") {
          iframe.style.height = Math.max(640, e.data.chessEquityHeight + 24) + "px";
        }
      });

      // Probe the backend so the Live tab is honest about needing the server.
      fetch("/api/play", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" })
        .then(function () { /* any response (even an error JSON) means the backend is up */ })
        .catch(function () {
          document.getElementById("live-hint").textContent = "needs the local server";
          document.getElementById("live-note").hidden = false;
        });

      show(document.getElementById("tab-guided"));  // default to the guided demo
    })();
  </script>
</body>
</html>
