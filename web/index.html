<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>chess-equity — interactive board (Maia-2 + Stockfish)</title>
  <!-- Real typefaces: Space Grotesk for the wordmark/headings, Inter for UI text.
       Falls back gracefully to the system stack if offline (the app stays usable). -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" />
  <link rel="stylesheet" href="board.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<!--
  The single view: an interactive board where every position is scored live by Maia-2
  (rating-conditioned equity) and Stockfish (the classic centipawn bar). Move the pieces
  to play your own line, or load a famous game and step through it. Needs the backend:
      uv run python web/server.py     # then open http://localhost:8000/
  Legal moves, SAN, game state and the famous-game library come from python-chess on the
  server (/api/play, /api/games, /api/game); this page just renders and posts intents.
-->
<body>
  <header class="site-header">
    <div class="wrap">
      <h1>chess&#8202;<span class="accent">equity</span></h1>
    </div>
  </header>

  <main class="wrap">
    <section class="board-col">
      <div class="game-picker">
        <label for="game-select">Load game</label>
        <select id="game-select" aria-label="load a famous game"></select>
        <button id="new" type="button">New game</button>
      </div>
      <div class="board-frame">
        <div id="board" class="board" aria-label="interactive chess board"></div>
      </div>
      <div class="controls">
        <button id="first" type="button" title="First (Home)">&#171;</button>
        <button id="prev" type="button" title="Previous (&larr;)">&#8249;</button>
        <input id="scrub" type="range" min="0" max="0" value="0" aria-label="move scrubber" />
        <button id="next" type="button" title="Next (&rarr;)">&#8250;</button>
        <button id="last" type="button" title="Last (End)">&#187;</button>
        <button id="flip" type="button" class="flip" title="Flip board (F)">&#8645;</button>
      </div>
      <div id="status" class="move-caption"></div>
    </section>

    <section class="moves-col">
      <div id="moves" class="moves" aria-label="move list"></div>
    </section>

    <section class="bars-col">
      <div class="card ratings">
        <div class="rating-row">
          <label for="white-elo">White rating</label>
          <output id="white-elo-out">1500</output>
          <input id="white-elo" type="range" min="1100" max="2300" step="100" value="1500" />
        </div>
        <div class="rating-row">
          <label for="black-elo">Black rating</label>
          <output id="black-elo-out">1500</output>
          <input id="black-elo" type="range" min="1100" max="2300" step="100" value="1500" />
        </div>
      </div>

      <div class="card bars">
        <div class="bar-block">
          <div class="bar-label">
            <span class="bar-name">Equity <span class="sub">rating-conditioned · Maia-2</span></span>
            <span class="readout" id="equity-readout">—</span>
          </div>
          <div class="bar equity-bar"><div class="fill" id="equity-fill"></div><span class="mid"></span></div>
        </div>
        <div class="bar-block">
          <div class="bar-label">
            <span class="bar-name">Classic eval <span class="sub">rating-blind · Stockfish</span></span>
            <span class="readout" id="cp-readout">—</span>
          </div>
          <div class="bar cp-bar"><div class="fill" id="cp-fill"></div><span class="mid"></span></div>
        </div>
        <p id="best" class="best-move"></p>
        <p id="divergence" class="divergence" hidden></p>
      </div>
    </section>
  </main>

  <script src="board.js"></script>
  <script src="live.js"></script>
</body>
</html>
