[project]
name = "chess-equity"
version = "0.0.1"
description = "A rating-conditioned chess equity bar — where good moves read as good, not just less bad."
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "chess>=1.10",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[project.scripts]
chess-equity = "chess_equity.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/chess_equity"]

[tool.pytest.ini_options]
testpaths = ["tests"]
