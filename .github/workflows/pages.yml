# Deploy the static web/ demo (task 0010) to GitHub Pages — task 0033.
#
# Publishes the web/ folder as-is (no build step: it is dependency-free static HTML/
# JS/JSON), then smoke-checks the live URL (HTTP 200 + title) so a broken deploy fails
# the run (task 0041). Uses only the repo's own GITHUB_TOKEN — no external account or
# secrets. The live URL is deterministic: https://theweihu.github.io/chess-equity/
#
# No manual setup needed: the configure-pages step below runs with enablement: true,
# so it turns Pages on (Source: GitHub Actions) itself on the first run. (Only if the
# org/repo forbids Actions from enabling Pages does a human have to flip it once in
# Settings → Pages.) This workflow then deploys on every push to the default branch.
name: Deploy web demo to Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

# Least-privilege: only what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; queue (don't cancel) newer ones.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # enablement: true lets the action turn on Pages (Source: GitHub Actions)
      # itself on first run, so a fresh repo doesn't 404 with "Pages not enabled"
      # at this step. (If org/repo policy forbids Actions enabling Pages, a human
      # must still flip it once in Settings → Pages.)
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Stage static assets (no Python sources / caches)
        run: |
          mkdir -p _site
          cp web/index.html web/app.css web/app.js web/*.json _site/
      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
      # Post-deploy smoke check (task 0041): confirm the just-published URL serves the
      # page, so a broken deploy fails the run instead of silently shipping. Pages can
      # take a moment to propagate, so retry briefly.
      - name: Smoke-check the deployed site (HTTP 200 + title)
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          echo "checking $url"
          ok=""
          for i in $(seq 1 6); do
            if curl -fsS "$url" -o page.html; then ok=1; break; fi
            echo "attempt $i: not ready yet, retrying in 5s…"; sleep 5
          done
          [ -n "$ok" ] || { echo "::error::site did not return 2xx at $url"; exit 1; }
          grep -q "chess-equity" page.html \
            || { echo "::error::expected 'chess-equity' marker missing"; head -20 page.html; exit 1; }
          echo "✓ $url is live (HTTP 200 + title marker present)"
