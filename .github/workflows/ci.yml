name: CI

# A deliberately tiny smoke check (task 0022): just "does the test suite still pass?"
# so parallel branches can't silently break each other or the base. NOT a strict gate —
# no coverage thresholds, no lint enforcement (this is a nukeable prototype; keep it
# out of the way of fast iteration). See README's experimental-prototype warning.

on:
  push:
    branches: [main, staging]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # The `data` extra (pyarrow/pandas/zstandard) is needed by the Parquet/dump tests;
      # `maia2`/`plots` stay out so CI never pulls torch/matplotlib for the smoke run.
      - name: Install
        run: pip install -e ".[dev,data]"
      # Tests live in tests/, plus the isolated baseline/, overlay/, and web/ suites
      # (web/ holds test_import_game.py — the Lichess game-import tooling).
      - name: Run tests
        run: pytest tests baseline overlay web -q
      # The thesis gate, asserted from the machine-readable verdict.json (task 0136) rather
      # than by re-parsing the markdown: run the torch-free baseline-vs-wdl-a gate on the
      # committed sample, then let `gate-check` turn verdict.json['pass'] into the build's
      # exit code. --min-n 0 disables the underpowered floor (task 0132) for the tiny fixture.
      - name: Assert thesis gate (verdict.json)
        run: |
          chess-equity validate --data data/sample/dataset.csv \
            --models baseline,wdl-a --bootstrap 0 --min-n 0 \
            --out "$RUNNER_TEMP/ci_gate.md"
          chess-equity gate-check "$RUNNER_TEMP/ci_gate.verdict.json"
      # The live demo's eval-cache logic (web/live.js) is gated by a dependency-free node
      # test: scrubbing a charted game must make zero /api/play calls (task 0123).
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run web JS tests
        run: node web/test_live.js
